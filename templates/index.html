<!DOCTYPE html>
<html>
<head>
    <title>Chaitanya's Web App</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        nav {
            background-color: #1e293b;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-size: 18px;
        }
        h1 {
            margin-top: 50px;
        }
        input {
            padding: 8px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background-color: #22c55e;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- 🔥 NAVBAR -->
    <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </nav>

    <h1>🚀 Welcome to Chaitanya's App</h1>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter your name" required>
        <br><br>
        <button type="submit">Submit</button>
    </form>

    <h2>{{ name }}</h2>

</body>
</html>
